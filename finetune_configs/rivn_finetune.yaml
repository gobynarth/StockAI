data:
  data_path: "/workspace/StockAI/data/RIVN.csv"
  lookback_window: 200
  predict_window: 40
  max_context: 512
  clip: 5.0
  train_ratio: 0.85
  val_ratio: 0.15
  test_ratio: 0.0

training:
  tokenizer_epochs: 20
  basemodel_epochs: 15
  batch_size: 32
  log_interval: 50
  num_workers: 4
  seed: 42
  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.000001
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1
  accumulation_steps: 1

model_paths:
  pretrained_tokenizer: "/workspace/Kronos/pretrained/Kronos-Tokenizer-base"
  pretrained_predictor: "/workspace/Kronos/pretrained/Kronos-base"
  exp_name: "RIVN_h40"
  base_path: "/workspace/StockAI/finetuned/"
  base_save_path: ""
  finetuned_tokenizer: ""
  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "RIVN_finetune"
  description: "Fine-tune Kronos-base on RIVN daily data, h=40"
  use_comet: false
